<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Restaurant - Timer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    background:#1b1b1b;
    border:2px solid #D4AF37;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 25px rgba(212,175,55,.25);
}

h1{
    color:#D4AF37;
    font-size:38px;
    margin-bottom:20px;
}

p{
    font-size:24px;
    line-height:2;
    color:#ddd;
}

#timer{
    margin-top:30px;
    font-size:40px;
    font-weight:bold;
    color:#FFD700;
}

.note{
    margin-top:25px;
    color:#aaa;
    font-size:18px;
}
</style>

</head>
<body>

<div class="container">

<h1>🍽 Azure Restaurant</h1>

<p>
آپ کی <b>Azure Restaurant</b> ویب سائٹ پر ٹائمر لگا ہوا ہے۔
<br><br>
براہِ کرم انتظار کریں۔
<br>
25 اگست 2026 کو ٹائمر ختم ہونے کے بعد ہی آپ ایڈمن پینل استعمال کر سکیں گے۔
</p>

<div id="timer"></div>

<div class="note">
آپ کا صبر کرنے کا شکریہ۔
</div>

</div>

<script>

const endDate = new Date("2026-08-25T23:59:59").getTime();

function countdown(){

const now = new Date().getTime();
const distance = endDate - now;

if(distance <= 0){
document.getElementById("timer").innerHTML =
"✅ ٹائمر ختم ہو گیا ہے۔ اب آپ ایڈمن پینل استعمال کر سکتے ہیں۔";
return;
}

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("timer").innerHTML =
days + " دن " +
hours + " گھنٹے " +
minutes + " منٹ " +
seconds + " سیکنڈ";

}

countdown();
setInterval(countdown,1000);

</script>

</body>
</html>
